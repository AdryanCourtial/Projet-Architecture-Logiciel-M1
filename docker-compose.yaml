   mysql:
      image: mysql:8.0
      container_name: mysql_db
      restart: unless-stopped
      environment:
         MYSQL_ROOT_PASSWORD: root
      ports:
         - "3310:3306"
      volumes:
         - mysql_data:/var/lib/mysql
   
   backend:
      container_name: backend-container
      build: ./nest-backend/
      ports:
         - 3000:3000
      volumes:
         - ./nest-backend/:/usr/app 
         - nodemodules:/usr/app/node_modules
      env_file: .env
      depends_on:
         - mysql
   
volumes: 
   nodemodules: {}
   mysql_data: {}
