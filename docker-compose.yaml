services:
   frontend:
      build:
         context: ./react-frontend
         dockerfile: Dockerfile
      environment:
         - CHOKIDAR_USEPOLLING=true
      ports:
         - "5173:5173"
      volumes:
         - ./react-frontend:/app
         - frontend_node_modules:/app/node_modules
      depends_on:
         - backend
      networks:
         - full-network
         
   mysql:
      image: mysql:8.0
      container_name: mysql_db
      restart: unless-stopped
      environment:
         MYSQL_ROOT_PASSWORD: root
      ports:
         - "3310:3306"
      volumes:
         - mysql_data:/var/lib/mysql
      networks:
         - full-network
   
   backend:
      container_name: backend-container
      build: ./nest-backend/
      ports:
         - 3000:3000
      volumes:
         - ./nest-backend/:/usr/app 
         - nodemodules:/usr/app/node_modules
      env_file: .env
      depends_on:
         - mysql
      networks:
         - full-network
   
volumes: 
   nodemodules: {}
   frontend_node_modules: {}
   mysql_data: {}

networks:
   full-network:
      driver: bridge
